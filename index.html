<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDFFlow | Merge & Split Fix</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        :root { --primary: #e53935; --secondary: #2c3e50; --bg-light: #f8f9fa; --white: #ffffff; --shadow: 0 4px 15px rgba(0,0,0,0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-light); color: var(--secondary); }
        nav { background: var(--white); padding: 1rem 5%; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); text-decoration: none; }
        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        .card { background: var(--white); padding: 30px; border-radius: 12px; box-shadow: var(--shadow); text-align: center; margin-bottom: 20px; }
        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 25px; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; background: #ddd; }
        .tab-btn.active { background: var(--primary); color: white; }
        .upload-box { border: 2px dashed #ccc; padding: 40px; border-radius: 8px; margin: 20px 0; }
        .btn-action { background: var(--primary); color: white; padding: 12px 30px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; margin-top: 15px; }
        .btn-action:disabled { background: #ccc; cursor: not-allowed; }
        input[type="text"] { width: 100%; max-width: 300px; padding: 12px; margin-top: 10px; border: 1px solid #ccc; border-radius: 4px; text-align: center; }
        #status { margin-top: 20px; font-weight: bold; }
        .file-list { text-align: center; margin: 15px 0; color: #2ecc71; font-weight: bold; }
    </style>
</head>
<body>

<nav><a href="#" class="logo">PDFFlow</a></nav>

<div class="container">
    <div class="tabs">
        <button id="tab-merge" class="tab-btn active" onclick="switchTab('merge')">Merge PDF</button>
        <button id="tab-split" class="tab-btn" onclick="switchTab('split')">Split PDF</button>
    </div>

    <div class="card">
        <h2 id="tool-title">Merge PDF</h2>
        <p id="tool-desc">Combine multiple PDFs into one document.</p>

        <div class="upload-box">
            <input type="file" id="pdf-input" hidden accept="application/pdf">
            <button class="btn-action" onclick="document.getElementById('pdf-input').click()">Select PDF Files</button>
            <div id="file-display" class="file-list"></div>
        </div>

        <div id="split-options" style="display: none; margin-bottom: 20px;">
            <label>Enter page numbers (e.g., 1, 3):</label><br>
            <input type="text" id="page-numbers" placeholder="e.g. 1, 2">
        </div>

        <button id="process-btn" class="btn-action" style="background: #2ecc71;" disabled>Download Processed PDF</button>
        <div id="status"></div>
    </div>
</div>

<script>
    const { PDFDocument } = PDFLib;
    let currentMode = 'merge';
    let selectedFiles = [];

    const fileInput = document.getElementById('pdf-input');
    const fileDisplay = document.getElementById('file-display');
    const processBtn = document.getElementById('process-btn');
    const status = document.getElementById('status');
    const splitOptions = document.getElementById('split-options');

    function switchTab(mode) {
        currentMode = mode;
        selectedFiles = []; // Clear files on switch
        renderFiles();
        status.innerText = "";
        
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('tab-' + mode).classList.add('active');
        
        document.getElementById('tool-title').innerText = mode === 'merge' ? 'Merge PDF' : 'Split PDF';
        document.getElementById('tool-desc').innerText = mode === 'merge' ? 'Combine multiple PDFs.' : 'Extract pages from a PDF.';
        splitOptions.style.display = mode === 'split' ? 'block' : 'none';
        
        fileInput.multiple = (mode === 'merge');
        fileInput.value = ""; // Reset input
    }

    fileInput.addEventListener('change', (e) => {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;

        if (currentMode === 'merge') {
            selectedFiles = [...selectedFiles, ...files];
        } else {
            selectedFiles = [files[0]]; // Only 1 file for split
        }
        renderFiles();
    });

    function renderFiles() {
        if (selectedFiles.length === 0) {
            fileDisplay.innerHTML = "";
            processBtn.disabled = true;
        } else {
            fileDisplay.innerHTML = selectedFiles.map(f => `<div>✅ ${f.name}</div>`).join('');
            processBtn.disabled = currentMode === 'merge' ? selectedFiles.length < 2 : false;
        }
    }

    processBtn.addEventListener('click', async () => {
        if (selectedFiles.length === 0) {
            status.innerText = "Error: No file selected";
            return;
        }

        status.innerText = "Processing...";
        status.style.color = "orange";

        try {
            const outputPdf = await PDFDocument.create();

            if (currentMode === 'merge') {
                for (const file of selectedFiles) {
                    const bytes = await file.arrayBuffer();
                    const pdf = await PDFDocument.load(bytes);
                    const pages = await outputPdf.copyPages(pdf, pdf.getPageIndices());
                    pages.forEach(p => outputPdf.addPage(p));
                }
            } else {
                const file = selectedFiles[0];
                const bytes = await file.arrayBuffer();
                const pdf = await PDFDocument.load(bytes);
                
                const pageInput = document.getElementById('page-numbers').value;
                if (!pageInput) throw new Error("Please enter page numbers");

                const pageIndices = pageInput.split(',')
                    .map(p => parseInt(p.trim()) - 1)
                    .filter(p => !isNaN(p) && p >= 0 && p < pdf.getPageCount());

                if (pageIndices.length === 0) throw new Error("Invalid page numbers");

                const pages = await outputPdf.copyPages(pdf, pageIndices);
                pages.forEach(p => outputPdf.addPage(p));
            }

            const pdfBytes = await outputPdf.save();
            const blob = new Blob([pdfBytes], { type: 'application/pdf' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = currentMode === "merge" ? "merged.pdf" : "split.pdf";
            link.click();

            status.innerText = "Success!";
            status.style.color = "green";
        } catch (err) {
            status.innerText = "Error: " + err.message;
            status.style.color = "red";
        }
    });
</script>
</body>
</html>
